<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OshiCamera">
<meta name="theme-color" content="#05060a">
<title>推しカメラ (prototype)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- キャラクター選択画面（現状1体だが、今後複数体を追加した時に自動でカード一覧になる） -->
<div id="select-screen">
  <div class="select-card">
    <h1>推しカメラ</h1>
    <p>一緒に撮影する推しを選んでください</p>
    <div id="character-list"></div>
  </div>
</div>

<!-- カメラ・ジャイロ許可前のスタート画面 -->
<div id="start-screen">
  <div class="start-card">
    <h1>準備OK</h1>
    <p>カメラと「向きの検知(ジャイロ)」への<br>アクセスを許可してください。<br>ジャイロを許可すると、スマホを動かしても推しがその場に立っているように見えます。</p>
    <button id="start-btn">カメラを起動する</button>
    <p class="start-note" id="start-error"></p>
  </div>
</div>

<!-- 撮影ステージ：video と three.js canvas を同じ矩形に重ねる -->
<div id="stage-wrap">
  <div id="stage">
    <video id="camera-video" autoplay playsinline muted></video>
    <canvas id="three-canvas"></canvas>
  </div>
</div>

<!-- 操作UI -->
<div id="ui-layer">
  <div id="top-bar">
    <button id="switch-cam-btn" class="icon-btn" title="カメラ切替">⟳</button>
    <div id="hint-text">1本指:移動　2本指:拡縮・回転</div>
    <button id="reset-btn" class="icon-btn" title="位置と向きの基準をリセット">⟲</button>
  </div>

  <div id="expression-bar"></div>

  <div id="bottom-bar">
    <button id="shutter-btn" aria-label="撮影"></button>
  </div>
</div>

<!-- 撮影結果プレビュー -->
<div id="result-screen">
  <div id="result-imgwrap">
    <img id="result-img" alt="撮影結果">
  </div>
  <p class="result-hint" id="result-hint">画像を長押しして「写真に保存」してください</p>
  <div id="result-actions">
    <button id="share-btn">保存・共有する</button>
    <button id="retake-btn">もう一度撮る</button>
  </div>
</div>

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div id="loading-text">推しを読み込み中…</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="main.js"></script>
</body>
</html>
