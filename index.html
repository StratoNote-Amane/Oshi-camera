<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OshiCamera">
<meta name="theme-color" content="#05060a">
<title>推しカメラ (prototype)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- キャラクター選択画面（現状1体だが、今後複数体を追加した時に自動でカード一覧になる） -->
<div id="select-screen">
  <div class="select-card">
    <h1>推しカメラ</h1>
    <p>一緒に撮影する推しを選んでください</p>
    <div id="character-list"></div>
  </div>
</div>

<!-- カメラ・ジャイロ許可前のスタート画面 -->
<div id="start-screen">
  <div class="start-card">
    <h1>準備OK</h1>
    <p>カメラと「向きの検知(ジャイロ)」への<br>アクセスを許可してください。<br>ジャイロを許可すると、スマホを動かしても推しがその場に立っているように見えます。</p>
    <button id="start-btn">カメラを起動する</button>
    <p class="start-note" id="start-error"></p>
  </div>
</div>

<!-- 撮影ステージ：video と three.js canvas を同じ矩形に重ねる -->
<div id="stage-wrap">
  <div id="stage">
    <video id="camera-video" autoplay playsinline muted></video>
    <canvas id="three-canvas"></canvas>
    <div id="grid-overlay"></div>
  </div>
</div>
<div id="flash-overlay"></div>
<div id="countdown-overlay"><span id="countdown-num"></span></div>

<!-- 操作UI -->
<div id="ui-layer">
  <div id="top-controls">
    <div id="top-bar">
      <div class="top-bar-left">
        <button id="switch-cam-btn" class="icon-btn" title="カメラ切替">⟳</button>
        <button id="grid-btn" class="icon-btn" title="構図グリッド">▦</button>
        <button id="timer-btn" class="icon-btn" title="セルフタイマー">⏱</button>
      </div>
      <div class="top-bar-right">
        <button id="mode-btn" class="mode-chip" title="写真/動画 切替">📷 写真</button>
        <button id="tune-btn" class="icon-btn" title="ポーズ調整モード">🛠</button>
        <button id="reset-btn" class="icon-btn" title="位置と向きの基準をリセット">⟲</button>
      </div>
    </div>
    <!-- アングル(フレーミング)切替：キャラクターの配置ではなくカメラ側を動かすので、
         数値が多少ズレていても他の操作(ドラッグ配置など)と干渉しない -->
    <div id="framing-bar"></div>
  </div>

  <!-- ポーズ/表情セレクター：以前は横スクロールの帯を2本(pose-bar/expression-bar)
       積んでいたが、項目数が増えると画面外にはみ出す・隠れる問題が繰り返し発生していた。
       シャッターを中心とした分割リング1つに統合し、カテゴリはcat-chipで巡回する方式に変更。
       (実機確認・調整の経緯はDECISION_LOG.mdへ別途ADRを追記予定) -->
  <button id="cat-chip"><span id="cat-label">ポーズ</span><span class="chev">▸</span></button>
  <div id="ring-label"></div>
  <svg id="ring-svg" width="176" height="176" viewBox="0 0 176 176"></svg>

  <div id="bottom-controls">
    <div id="bottom-bar">
      <div id="shutter-status"></div>
      <div id="capture-row">
        <button id="shutter-btn" aria-label="撮影"></button>
      </div>
    </div>
  </div>
</div>

<!-- 撮影結果プレビュー -->
<div id="result-screen">
  <div id="result-imgwrap">
    <img id="result-img" alt="撮影結果">
    <video id="result-video" playsinline controls loop></video>
  </div>
  <p class="result-hint" id="result-hint">画像を長押しして「写真に保存」してください</p>
  <div id="result-actions">
    <button id="share-btn">保存・共有する</button>
    <button id="retake-btn">もう一度撮る</button>
  </div>
</div>

<div id="pose-toast"></div>

<!-- 床キャリブレーション画面(Ground Confidence Engine)：
     起動直後、カメラのレンズの床からの高さ(cm)を確認・調整してもらうUI。
     以前は画面中央のラインを目視で床に合わせる方式だったが、ジャイロの
     姿勢推定自体の精度が保証されないため三角関数での逆算をやめ、
     また「目視での接地判断は信頼できない」という指摘も踏まえて、
     数値をそのまま確認するだけの方式に変更した(2026/07)。 -->
<div id="ground-calib-screen">
  <div class="ground-calib-card">
    <p>スマホを構える高さ（カメラの位置）を<br>確認してください。目安は150cmです。<br>実際に構える高さに近ければ、後で調整しなくても問題ありません。</p>
    <div class="ground-calib-height-row">
      <input type="range" id="ground-calib-height-slider" min="80" max="220" step="1" value="150">
      <span id="ground-calib-height-value">150cm</span>
    </div>
    <button id="ground-calib-ok-btn">OK</button>
  </div>
</div>

<!-- 床推定デバッグ表示(Ground Confidence Engine)：通常は非表示。
     ?debug=1 か localStorageのoshi_debug_groundで有効化できる。
     「遠距離で米粒のように小さい」問題の原因切り分けのため、Z距離と
     キャラクターの実寸高さ(m)も併記する(2026/07診断用に追加)。 -->
<div id="ground-debug-overlay">
  <div class="gd-label">GROUND</div>
  <div class="gd-label">Confidence</div>
  <div id="ground-debug-value">--%</div>
  <div class="gd-label" style="margin-top:6px">DISTANCE</div>
  <div id="ground-debug-distance">-- m</div>
  <div class="gd-label" style="margin-top:6px">CHAR HEIGHT</div>
  <div id="ground-debug-height">-- m</div>
</div>

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div id="loading-text">推しを読み込み中…</div>
</div>

<!-- ポーズ調整パネル：実機でボーンの角度をその場で追い込むための開発者向けツール -->
<div id="pose-panel">
  <div class="pose-panel-head">
    <span>ポーズ調整モード</span>
    <button id="pose-panel-close" class="icon-btn small">✕</button>
  </div>
  <div class="pose-panel-row">
    <label>ボーン</label>
    <select id="tune-bone-select"></select>
  </div>
  <div class="pose-panel-row slider-row">
    <label>X</label>
    <input type="range" id="tune-x" min="-180" max="180" step="1" value="0">
    <span id="tune-x-val">0</span>
  </div>
  <div class="pose-panel-row slider-row">
    <label>Y</label>
    <input type="range" id="tune-y" min="-180" max="180" step="1" value="0">
    <span id="tune-y-val">0</span>
  </div>
  <div class="pose-panel-row slider-row">
    <label>Z</label>
    <input type="range" id="tune-z" min="-180" max="180" step="1" value="0">
    <span id="tune-z-val">0</span>
  </div>
  <div class="pose-panel-actions">
    <button id="tune-reset-btn">このポーズを初期値に戻す</button>
    <button id="tune-copy-btn">JSONをコピー</button>
  </div>
  <p class="pose-panel-hint" id="pose-panel-hint"></p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script src="js/pose-ring.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>
